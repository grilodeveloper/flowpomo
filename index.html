<!-- FlowPomo — Jhonnyssom Silva, 2026 -->
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowPomo</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="top-bar">
      <span class="logo">FlowPomo</span>
      <span id="streak-badge"></span>
    </div>

    <div id="phase-label">foco</div>

    <input
      type="text"
      id="task-input"
      placeholder="// no que você está trabalhando?"
      maxlength="80"
    />

    <div id="timer">25:00</div>

    <div class="progress-track"><div id="progress-fill"></div></div>

    <div class="dots" id="dots">
      <div class="dot current" data-i="0"></div>
      <div class="dot" data-i="1"></div>
      <div class="dot" data-i="2"></div>
      <div class="dot" data-i="3"></div>
    </div>

    <div class="controls">
      <button class="btn" onclick="resetTimer()">reset</button>
      <button class="btn primary" id="start-btn" onclick="toggleTimer()">
        iniciar
      </button>
      <button class="btn" onclick="skipPhase()">skip</button>
    </div>

    <div class="stats-row">
      <span id="cycle-info">ciclo 1</span>
      <span class="stats-sep">·</span>
      <span id="focus-time">00:00 foco</span>
      <span class="stats-sep">·</span>
      <span id="goal-info">0 / 6 sessões</span>
    </div>

    <div class="goal-track"><div id="goal-fill"></div></div>

    <div id="quote"></div>

    <div id="kbd-hint">space · iniciar &nbsp; r · reset &nbsp; s · skip</div>
    <div id="credit">Jhonnyssom Silva · 2026</div>

    <!-- Minimal audio controls -->
    <div id="player-bar">
      <button id="play-btn" onclick="toggleAudio()">▶ play</button>
      <input
        id="vol-slider"
        type="range"
        min="0"
        max="100"
        value="50"
        oninput="setVolume(this.value)"
      />
    </div>

    <!-- Bottom-left controls: config + zoom -->
    <div id="bottom-left">
      <button class="btn" id="settings-toggle" onclick="toggleSettings()">config</button>
      <button class="btn" onclick="adjustZoom(-1)">A−</button>
      <button class="btn" onclick="adjustZoom(+1)">A+</button>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel">
      <div class="settings-title">configurações</div>
      <div class="setting-row">
        <label>foco</label>
        <input
          type="number"
          id="cfg-focus"
          min="1"
          max="90"
          value="25"
          onchange="applyConfig()"
        />
        <span>min</span>
      </div>
      <div class="setting-row">
        <label>pausa curta</label>
        <input
          type="number"
          id="cfg-short"
          min="1"
          max="30"
          value="5"
          onchange="applyConfig()"
        />
        <span>min</span>
      </div>
      <div class="setting-row">
        <label>pausa longa</label>
        <input
          type="number"
          id="cfg-long"
          min="1"
          max="60"
          value="15"
          onchange="applyConfig()"
        />
        <span>min</span>
      </div>
      <div class="setting-row">
        <label>meta diária</label>
        <input
          type="number"
          id="cfg-goal"
          min="1"
          max="20"
          value="6"
          onchange="applyConfig()"
        />
        <span>sessões</span>
      </div>
      <div class="setting-row">
        <label>aviso</label>
        <select id="cfg-sound" onchange="applyConfig()">
          <option value="beep">beep</option>
          <option value="chime">chime</option>
          <option value="bell">bell</option>
        </select>
      </div>
      <div class="setting-row">
        <label>ambiente</label>
        <select id="cfg-ambient" onchange="applyConfig()">
          <option value="off">desligado</option>
          <option value="noise">ruído branco</option>
          <option value="rain">chuva</option>
        </select>
      </div>
    </div>

    <!-- Hidden YouTube iframe (audio only) -->
    <div id="yt-wrap"><div id="yt-player"></div></div>

    <script src="main.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
